name: Auto Merge Bot PRs

on:
  check_run:
    types: [completed]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.check_run.conclusion == 'success'
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Merge associated PR
        run: |
          PR=$(gh pr list --state open --json number,headSha \
            -q ".[] | select(.headSha==\"${{ github.event.check_run.head_sha }}\") | .number")
          if [ -n "$PR" ]; then
            gh pr merge --merge "$PR"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
